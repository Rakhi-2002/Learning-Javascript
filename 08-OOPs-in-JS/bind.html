<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React</title>
</head>
<body>
    <button>Button Clicked</button>
</body>
<script>
    class React {
        constructor(){
            this.library = "React"
            this.server = "https://localhost:8080"

            //Business Requirement
            //here, initial this = refers button, later this = refers React class
            //using bind we are binding/connecting button with the reference of React class 
            document
                .querySelector('button')
                .addEventListener('click', this.handleClick.bind(this))
        }
        handleClick(){
            console.log(`Button is Clicked`);            
            console.log(this);   
        }
    }

    const app = new React()

</script>
</html>
